<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSearch - Movie Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="container">
        <h1>CineSearch</h1>

        <div id="welcomeMessage">

    <script src="script.js"></script>
</body>
</html>
